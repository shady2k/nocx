# CI — quality gates for nocx.
#
# Runner decision: back-end job runs on macos-latest because:
#   - darwin is the target platform for this macOS-first MVP (see
#     docs/architecture.md § "Operational / Environmental Envelope"), so CI
#     should build and test what ships to users;
#   - internal/pty exercises creack/pty, and PTY semantics differ between macOS
#     and Linux — those tests are only meaningful on the target OS;
#   - the repo is public, so macos-latest runner minutes are free.
# (Note: wails/v2 also requires GTK3/WebKit2GTK on Linux; the decision stands
# on the target-OS argument alone, without measuring ubuntu.)
# The pre-commit hook and the Makefile `ci` target mirror this same set of
# checks so "green" is identical locally and in CI.
#
# Trigger decision: CI runs on release branches (release/**) and manual
# workflow_dispatch, and is *called* by release.yml via workflow_call so a tag
# release cannot exist without a green run on that exact commit. The standalone
# `push: tags: ['v*']` trigger is deliberately gone: with release.yml calling
# this workflow, keeping it would run the whole suite twice for every release
# for no added protection (see distribution design §5). Everyday protection on
# main comes from the local pre-commit hook and make ci, which run the same
# checks.

name: CI

on:
  push:
    branches: ['release/**']
  workflow_dispatch:
  workflow_call:

# Least privilege: the quality gates only read the repo. When release.yml calls
# this workflow the effective token is the intersection with what the caller
# grants, so the publish job's write scope never reaches these jobs.
permissions:
  contents: read

jobs:
  backend:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting
        run: |
          UNFMT=$(gofumpt -l .)
          if [ -n "$UNFMT" ]; then
            echo "gofumpt: the following files need formatting:"
            echo "$UNFMT"
            exit 1
          fi
          echo "gofumpt: all files formatted"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: Lint
        run: golangci-lint run ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # e2e — the checks that only exist in a real browser against the real app.
  #
  # Runner decision: macos-latest, for a different reason than the backend job.
  # Playwright drives its own Chromium against :34115, so the app's webview
  # engine (WKWebView here, WebKit2GTK on Linux) is never what these tests
  # observe — the engine argument does not apply. What decides it is cost of
  # machinery: `wails dev` on ubuntu needs GTK3/WebKit2GTK and an xvfb display
  # to open a window we never look at, while a macOS runner has a window server
  # already and the minutes are free for a public repo.
  #
  # No `wails dev` step here: playwright.config.ts starts and stops it, so a
  # clean checkout runs the suite with one command and nothing is left behind
  # (see the gracefulShutdown note there).
  e2e:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Pinned to the version in go.mod: the CLI builds the app, so a drift
      # between the two is a build no developer can reproduce locally.
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      # Root deps are @playwright/test only; `wails dev` runs frontend:install
      # itself, so the frontend is not installed here.
      - run: npm ci
      # Both engines the suite declares. WebKit is not a luxury here: the app
      # ships inside WKWebView, so WebKit is the closer of the two to what users
      # run, and installing only chromium would fail the run outright.
      - run: npx playwright install chromium webkit

      - run: npx playwright test

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
